<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'JetBrains Mono';
  src: url('../fonts/JetBrainsMono-Italic-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: italic;
  font-display: swap;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'JetBrains Mono', monospace; background: #F8F7FF; padding: 24px; display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; align-items: baseline; gap: 16px; }
.size-label { font-size: 10px; color: #9585C0; white-space: nowrap; width: 80px; flex-shrink: 0; font-family: 'DM Sans', sans-serif; font-style: normal; }
.divider { height: 1px; background: rgba(124,58,237,0.1); margin: 2px 0; }
.accent-italic { font-style: italic; background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.pair { display: flex; gap: 32px; align-items: baseline; }
.tag { font-family: 'DM Sans', sans-serif; font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #9585C0; font-style: normal; }
</style></head><body>

<div class="row"><span class="size-label">48px 800 italic</span>
  <span class="accent-italic" style="font-size:48px;font-weight:800;letter-spacing:-2px">in Minutes</span>
</div>
<div class="divider"></div>
<div class="row"><span class="size-label">36px 800 italic</span>
  <span style="font-size:32px;font-weight:800;letter-spacing:-1.5px;font-style:italic;color:#1A0A3C">four steps</span>
</div>
<div class="row"><span class="size-label">28px 700 italic</span>
  <span style="font-size:24px;font-weight:700;letter-spacing:-1px;font-style:italic;color:#1A0A3C">build and sell</span>
</div>
<div class="divider"></div>
<div class="pair">
  <div>
    <div class="tag" style="margin-bottom:6px">Upright 800</div>
    <span style="font-size:28px;font-weight:800;letter-spacing:-1.5px;color:#1A0A3C">KDP Lab</span>
  </div>
  <div>
    <div class="tag" style="margin-bottom:6px">Italic 800 ← brand font</div>
    <span class="accent-italic" style="font-size:28px;font-weight:800;letter-spacing:-1.5px">KDP Lab</span>
  </div>
  <div>
    <div class="tag" style="margin-bottom:6px">Italic 400</div>
    <span style="font-size:28px;font-weight:400;letter-spacing:-0.5px;font-style:italic;color:#5B4B8A">KDP Lab</span>
  </div>
</div>
<div class="divider"></div>
<div class="row"><span class="size-label">14px italic</span>
  <span style="font-size:14px;font-weight:400;font-style:italic;color:#5B4B8A">Generate puzzle books, journals &amp; coloring books — KDP-ready.</span>
</div>

</body></html>
