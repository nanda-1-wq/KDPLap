<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: #F8F7FF; padding: 20px; }
.row { display: flex; gap: 10px; }
.swatch { flex: 1; border-radius: 10px; overflow: hidden; }
.color { height: 64px; }
.meta { padding: 8px 10px; background: white; border: 1px solid rgba(124,58,237,0.12); border-top: none; border-radius: 0 0 8px 8px; }
.name { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; color: #1A0A3C; }
.hex { font-size: 10px; color: #9585C0; margin-top: 2px; }
.label { font-size: 9px; font-weight: 500; color: #5B4B8A; text-transform: uppercase; letter-spacing: 0.8px; margin-top: 3px; }
</style></head><body>
<div class="row">
  <div class="swatch">
    <div class="color" style="background:#5B21B6"></div>
    <div class="meta"><div class="name">700</div><div class="hex">#5B21B6</div><div class="label">Deep</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#7C3AED"></div>
    <div class="meta"><div class="name">600 ★</div><div class="hex">#7C3AED</div><div class="label">Primary</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#9D6FEC"></div>
    <div class="meta"><div class="name">500</div><div class="hex">#9D6FEC</div><div class="label">Mid</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#A78BFA"></div>
    <div class="meta"><div class="name">400</div><div class="hex">#A78BFA</div><div class="label">Light</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#C4B5FD"></div>
    <div class="meta"><div class="name">300</div><div class="hex">#C4B5FD</div><div class="label">Lighter</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#EDE9FE"></div>
    <div class="meta"><div class="name">100</div><div class="hex">#EDE9FE</div><div class="label">Pale</div></div>
  </div>
  <div class="swatch">
    <div class="color" style="background:#F8F7FF; border: 1px solid rgba(124,58,237,0.15); border-bottom: none;"></div>
    <div class="meta"><div class="name">050</div><div class="hex">#F8F7FF</div><div class="label">Off-white</div></div>
  </div>
</div>
</body></html>
