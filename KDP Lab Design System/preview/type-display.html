<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'JetBrains Mono';
  src: url('../fonts/JetBrainsMono-Italic-VariableFont_wght.ttf') format('truetype');
  font-weight: 100 900;
  font-style: italic;
  font-display: swap;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'JetBrains Mono', monospace; background: #F8F7FF; padding: 24px; display: flex; flex-direction: column; gap: 10px; }
.row { display: flex; align-items: baseline; gap: 16px; }
.size-label { font-size: 10px; color: #9585C0; white-space: nowrap; width: 70px; flex-shrink: 0; font-family: 'DM Sans', sans-serif; }
.word { color: #1A0A3C; line-height: 1.1; }
.accent { background: linear-gradient(135deg, #7C3AED 0%, #A78BFA 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.divider { height: 1px; background: rgba(124,58,237,0.1); margin: 2px 0; }
</style></head><body>
<div class="row"><span class="size-label">64px 800</span><span class="word accent" style="font-size:48px;font-weight:800;letter-spacing:-2px">KDP Lab</span></div>
<div class="divider"></div>
<div class="row"><span class="size-label">44px 800</span><span class="word" style="font-size:36px;font-weight:800;letter-spacing:-1.5px">Section Title</span></div>
<div class="row"><span class="size-label">19px 700</span><span class="word" style="font-size:19px;font-weight:700;letter-spacing:-0.4px">KDP <em style="font-style:normal;color:#7C3AED">Lab</em> — Logo Wordmark</span></div>
<div class="row"><span class="size-label">18px 700</span><span class="word" style="font-size:18px;font-weight:700;letter-spacing:-0.3px">Card Heading</span></div>
<div class="row"><span class="size-label">16px 700</span><span class="word" style="font-size:16px;font-weight:700;letter-spacing:-0.3px">Step / Template Title</span></div>
<div class="row"><span class="size-label">14px 700</span><span class="word" style="font-size:14px;font-weight:700;letter-spacing:-0.2px">Small Feature Heading</span></div>
<div class="row"><span class="size-label">11px 700</span><span class="word" style="font-size:11px;font-weight:700;letter-spacing:1px;color:#C4B5FD">STEP 01 — UPRIGHT</span></div>
</body></html>
