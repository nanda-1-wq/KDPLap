<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KDP Lab — UI Kit</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --violet: #7C3AED; --violet-mid: #9D6FEC; --violet-light: #A78BFA;
    --violet-pale: #EDE9FE; --violet-glow: rgba(124,58,237,0.22);
    --violet-dim: rgba(124,58,237,0.08);
    --white: #FFFFFF; --off-white: #F8F7FF;
    --text: #1A0A3C; --text-mid: #5B4B8A; --text-muted: #9585C0;
    --border: rgba(124,58,237,0.12); --border-strong: rgba(124,58,237,0.25);
    --shadow-sm: 0 2px 16px rgba(124,58,237,0.08);
    --shadow-md: 0 8px 40px rgba(124,58,237,0.14);
    --shadow-lg: 0 24px 80px rgba(124,58,237,0.18);
    --font-display: 'JetBrains Mono', monospace;
    --font-body: 'DM Sans', sans-serif;
  }
  [data-theme="dark"] {
    --violet: #A78BFA; --violet-mid: #B59FFD; --violet-light: #7C3AED;
    --violet-pale: rgba(124,58,237,0.15); --violet-glow: rgba(167,139,250,0.25);
    --violet-dim: rgba(167,139,250,0.10);
    --white: #0F0B1A; --off-white: #140F22;
    --text: #F0ECF9; --text-mid: #B0A3CC; --text-muted: #7A6B9A;
    --border: rgba(167,139,250,0.12); --border-strong: rgba(167,139,250,0.22);
    --shadow-sm: 0 2px 16px rgba(0,0,0,0.25);
    --shadow-md: 0 8px 40px rgba(0,0,0,0.35);
    --shadow-lg: 0 24px 80px rgba(0,0,0,0.45);
  }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--off-white); color: var(--text); }

  @keyframes orbDrift { from { transform: translate(0,0); } to { transform: translate(30px,20px); } }
  @keyframes floatA { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
  @keyframes floatB { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }
  @keyframes shimmer { to { background-position: 200% center; } }
  @keyframes fadeUp { from { opacity:0; transform:translateY(18px); } to { opacity:1; transform:translateY(0); } }

  /* Footer */
  .footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    background: var(--white);
  }
  .footer-inner {
    max-width: 1080px; margin: 0 auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .footer-copy { font-size: 13px; color: var(--text-muted); font-weight: 300; }
  .footer-links { display: flex; gap: 20px; }
  .footer-links a { font-size: 13px; color: var(--text-mid); text-decoration: none; }
  .footer-links a:hover { color: var(--violet); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(124,58,237,0.2); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Features.jsx"></script>
<script type="text/babel" src="Dashboard.jsx"></script>
<script type="text/babel" src="Generator.jsx"></script>

<script type="text/babel">
const STORAGE_KEY = 'kdplab_screen';

const App = () => {
  const [screen, setScreen] = React.useState(() => localStorage.getItem(STORAGE_KEY) || 'landing');
  const [scrolled, setScrolled] = React.useState(false);

  React.useEffect(() => {
    localStorage.setItem(STORAGE_KEY, screen);
    window.scrollTo(0, 0);
  }, [screen]);

  React.useEffect(() => {
    const handleScroll = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', handleScroll, { passive: true });
    return () => window.removeEventListener('scroll', handleScroll);
  }, []);

  const isApp = screen === 'dashboard' || screen === 'generator';

  return (
    <div>
      {/* Navbar — always shown */}
      <NavComponent screen={screen} setScreen={setScreen} scrolled={isApp || scrolled} />

      {screen === 'landing' && (
        <div>
          <HeroComponent setScreen={setScreen} />
          <FeaturesComponent />
          <footer className="footer">
            <div className="footer-inner">
              <span className="footer-copy">© 2026 KDP Lab. All rights reserved.</span>
              <div className="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
              </div>
              <div style={{display:'flex',gap:8}}>
                {/* X / Twitter */}
                <a href="https://x.com/3desso" target="_blank" rel="noopener noreferrer" aria-label="X (Twitter)"
                  style={{width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-mid)',textDecoration:'none',transition:'color 0.2s,background 0.2s,border-color 0.2s'}}
                  onMouseEnter={e=>{e.currentTarget.style.color='var(--violet)';e.currentTarget.style.background='var(--violet-dim)';e.currentTarget.style.borderColor='var(--border-strong)'}}
                  onMouseLeave={e=>{e.currentTarget.style.color='var(--text-mid)';e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor='var(--border)'}}>
                  <svg viewBox="0 0 24 24" fill="currentColor" style={{width:15,height:15}}>
                    <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
                  </svg>
                </a>
                {/* LinkedIn */}
                <a href="https://linkedin.com/in/adnan-abdalrhman" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"
                  style={{width:34,height:34,display:'flex',alignItems:'center',justifyContent:'center',border:'1px solid var(--border)',borderRadius:8,color:'var(--text-mid)',textDecoration:'none',transition:'color 0.2s,background 0.2s,border-color 0.2s'}}
                  onMouseEnter={e=>{e.currentTarget.style.color='var(--violet)';e.currentTarget.style.background='var(--violet-dim)';e.currentTarget.style.borderColor='var(--border-strong)'}}
                  onMouseLeave={e=>{e.currentTarget.style.color='var(--text-mid)';e.currentTarget.style.background='transparent';e.currentTarget.style.borderColor='var(--border)'}}>
                  <svg viewBox="0 0 24 24" fill="currentColor" style={{width:15,height:15}}>
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                  </svg>
                </a>
              </div>
            </div>
          </footer>
        </div>
      )}

      {screen === 'dashboard' && <DashboardComponent setScreen={setScreen} />}
      {screen === 'generator' && <GeneratorComponent setScreen={setScreen} />}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
